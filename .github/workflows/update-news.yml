name: "🔄 Update Anti-FOMO Daily News"

# ─── Schedule ────────────────────────────────────────────────────────
# Runs at 04:30 and 16:30 UTC  →  05:30 / 17:30 CET  →  12:30 / 00:30 Beijing
on:
  schedule:
    - cron: "30 4 * * *"   # every day at 04:30 UTC
    - cron: "30 16 * * *"  # every day at 16:30 UTC
  workflow_dispatch: {}     # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to push data.json back

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ① Check out the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # ② Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      # ③ Install dependencies
      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # ④ Run the news fetch script
      - name: Fetch & summarise news
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'gemini' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-chat' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.0-flash' }}
        run: python scripts/fetch_and_summarize.py

      # ⑤ Commit & push the updated data.json
      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          # Only commit if there are actual changes
          git diff --cached --quiet || \
            git commit -m "📰 Auto-update news data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
