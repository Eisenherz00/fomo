name: "🔄 Update Anti-FOMO Daily News"

# ─── Schedule ────────────────────────────────────────────────────────
# Runs at 04:30 and 16:30 UTC  →  05:30 / 17:30 CET  →  12:30 / 00:30 Beijing
on:
  schedule:
    - cron: "30 4 * * *"
    - cron: "30 16 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch news from RSS
        run: python scripts/fetch_and_summarize.py

      - name: Commit and push data.json
        run: |
          git config user.name  "Eisenherz00"
          git config user.email "eisenherz00@users.noreply.github.com"
          git add public/data.json
          git diff --cached --quiet || \
            git commit -m "📰 Auto-update news data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push

      - name: Trigger Vercel redeploy
        if: success()
        run: |
          curl -s -X POST "https://api.vercel.com/v1/integrations/deploy/${{ secrets.VERCEL_DEPLOY_HOOK }}" || echo "No deploy hook set, Vercel will deploy on push"
